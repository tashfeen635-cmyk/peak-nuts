<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Peak Nuts</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to Peak Nuts homepage.">
  <meta name="theme-color" content="#8B9A46">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Open Sans', Arial, sans-serif;
      background: #f9f8f5;
      color: #5d5b5b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .error-code {
      font-family: 'Marcellus', Georgia, serif;
      font-size: clamp(80px, 20vw, 160px);
      color: #1a1a1a;
      line-height: 1;
      letter-spacing: -4px;
    }
    .error-title {
      font-family: 'Marcellus', Georgia, serif;
      font-size: clamp(22px, 4vw, 32px);
      color: #1a1a1a;
      margin: 16px 0 12px;
    }
    .error-message {
      font-size: 15px;
      line-height: 1.7;
      max-width: 440px;
      margin: 0 auto 32px;
    }
    .home-link {
      display: inline-block;
      background: #1a1a1a;
      color: #fff;
      text-decoration: none;
      padding: 14px 36px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.3s ease;
    }
    .home-link:hover {
      background: #8B9A46;
    }
    .brand {
      font-family: 'Marcellus', Georgia, serif;
      font-size: 18px;
      color: #1a1a1a;
      text-decoration: none;
      margin-bottom: 40px;
    }
  </style>
</head>
<body>
  <a href="index.html" class="brand">Peak Nuts</a>
  <div class="error-code">404</div>
  <h1 class="error-title">Page Not Found</h1>
  <p class="error-message">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <a href="index.html" class="home-link">Back to Homepage</a>
</body>
</html>
